<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoteX</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="toolbar">
        <button id="btn-new">+ 新建</button>
        <span class="title">NoteX</span>
      </header>
      <main class="content">
        <aside class="sidebar" id="note-list"></aside>
        <section class="editor-area">
          <textarea id="editor" placeholder="开始写下你的笔记..."></textarea>
        </section>
      </main>
      <footer class="statusbar">
        <span id="char-count">0 字</span>
        <span id="line-count">0 行</span>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
